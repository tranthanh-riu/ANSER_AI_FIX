name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install sqlalchemy requests ddgs
      - name: Ruff
        run: ruff check src/core/tools.py src/core/memory.py src/core/context.py tests
      - name: Mypy
        run: mypy src/core/tools.py src/core/memory.py src/core/context.py
      - name: Pytest
        run: pytest -q
